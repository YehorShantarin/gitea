apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-db
  namespace: production
spec:
  instances: 2

  storage:
    size: 2Gi
    storageClass: gp2

  bootstrap:
    initdb:
      database: gitea
      owner: gitea

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi