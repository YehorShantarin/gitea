apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: production
spec:
  interval: 10m
  chart:
    spec:
      chart: gitea
      version: ">=11.0.0 <12.0.0"
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1

    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis:
      enabled: false
    redis-cluster:
      enabled: false

    persistence:
      enabled: true
      size: 20Gi
      storageClass: gp2

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: gitea.local
          paths:
            - path: /
              pathType: Prefix

    gitea:
      admin:
        username: gitea_admin
        password: changeme-production
        email: admin@gitea.local
      config:
        database:
          DB_TYPE: postgres
          HOST: gitea-db-rw:5432
          NAME: gitea
          SCHEMA: public
          SSL_MODE: require
      additionalConfigFromEnvs:
        - name: GITEA__database__USER
          valueFrom:
            secretKeyRef:
              name: gitea-db-app
              key: username
        - name: GITEA__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: gitea-db-app
              key: password