apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-staging
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps/staging
  prune: true
  dependsOn:
    - name: infra-operators
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps/production
  prune: true
  dependsOn:
    - name: infra-operators
  sourceRef:
    kind: GitRepository
    name: flux-system